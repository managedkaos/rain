<!DOCTYPE html>
<html>
    <head>
        <title>Cognito Demo Site</title>
        <style>
            body {{
                font-family: Arial, sans-serif;
                line-height: 1.6;
                max-width: 800px;
                margin: 0 auto;
            }}

            h1, h2 {{
                color: #333;
                border-bottom: 1px solid #ccc;
            }}

            p {{
                margin-bottom: 16px;
            }}

            table {{
                width: 50%;
                border-collapse: collapse;
                margin-bottom: 20px;
            }}

            td, th {{
                padding: 10px;
                border: 1px solid #ccc;
                text-align: left;
            }}

            th {{
                background-color: #f2f2f2;
                font-weight: bold;
            }}

            td:first-child, th:first-child {{
                font-weight: bold;
                background-color: #26A69A;
            }}

            td b {{
                font-weight: normal;
            }}
        </style>
    </head>
    <body>
        <h1>Home</h1>
        <p>{content}</p>
        {info_table}
    </body>
</html>
