---
Description: Public ALB with a private Auto Scaling Group running a simple web app on Amazon Linux 2023

Parameters:
  VpcId:
    Description: VPC for the ALB, target group, and Auto Scaling Group. Select your default VPC when using the default network.
    Type: AWS::EC2::VPC::Id

  AlbSubnetIds:
    Description: At least two subnets in the selected VPC for the internet-facing ALB. Default VPC subnets are recommended.
    Type: List<AWS::EC2::Subnet::Id>

  AsgSubnetIds:
    Description: Subnets in the selected VPC for the Auto Scaling Group. These can be the same default VPC subnets because instances will not receive public IPs.
    Type: List<AWS::EC2::Subnet::Id>

  InstanceType:
    Description: The size to use for the EC2 instances in the Auto Scaling Group
    Type: String
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
      - t3.xlarge
      - t3.2xlarge
    Default: t3.medium
    ConstraintDescription: Must be a valid EC2 instance type.

  MinSize:
    Description: Minimum number of instances in the Auto Scaling Group
    Type: Number
    Default: 2
    MinValue: 1

  DesiredCapacity:
    Description: Desired number of instances in the Auto Scaling Group
    Type: Number
    Default: 2
    MinValue: 1

  MaxSize:
    Description: Maximum number of instances in the Auto Scaling Group
    Type: Number
    Default: 4
    MinValue: 1

Resources:
  Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: [ec2.amazonaws.com]
            Action: ['sts:AssumeRole']
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  Profile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles: [!Ref Role]

  LoadBalancerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic from the internet to the ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - CidrIp: 0.0.0.0/0
          IpProtocol: tcp
          FromPort: 80
          ToPort: 80
      SecurityGroupEgress:
        - CidrIp: 0.0.0.0/0
          IpProtocol: -1

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic from the ALB to the Auto Scaling Group instances
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref LoadBalancerSecurityGroup
      SecurityGroupEgress:
        - CidrIp: 0.0.0.0/0
          IpProtocol: -1

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      SecurityGroups:
        - !Ref LoadBalancerSecurityGroup
      Subnets: !Ref AlbSubnetIds
      Type: application

  ApplicationTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      HealthCheckEnabled: true
      HealthCheckPath: /
      HealthCheckProtocol: HTTP
      Matcher:
        HttpCode: 200
      Port: 80
      Protocol: HTTP
      TargetType: instance
      VpcId: !Ref VpcId

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ApplicationTargetGroup
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64}}'
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Name: !Ref Profile
        MetadataOptions:
          HttpTokens: required
        NetworkInterfaces:
          - AssociatePublicIpAddress: false
            DeviceIndex: 0
            Groups:
              - !Ref InstanceSecurityGroup
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub ${AWS::StackName}-asg-instance
              - Key: asg-instance
                Value: true
        UserData: !Base64
          Fn::Sub: |
            #!/bin/bash -xe
            exec > >(tee /var/log/user-data.log) 2>&1

            dnf install stress-ng amazon-cloudwatch-agent -y

            mkdir -p /opt/aws/amazon-cloudwatch-agent/etc
            cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json <<'CWAGENT'
            {
              "metrics": {
                "metrics_collected": {
                  "cpu": {
                    "measurement": ["cpu_usage_idle", "cpu_usage_user", "cpu_usage_system"],
                    "metrics_collection_interval": 60,
                    "totalcpu": true
                  },
                  "mem": {
                    "measurement": ["mem_used_percent"],
                    "metrics_collection_interval": 60
                  }
                }
              }
            }
            CWAGENT

            systemctl enable amazon-cloudwatch-agent
            systemctl start amazon-cloudwatch-agent

            app_dir=/opt/compute-signals-demo
            mkdir -p "$app_dir"

            token=$(curl -X PUT "http://169.254.169.254/latest/api/token" \
              -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
            instance_id=$(curl -H "X-aws-ec2-metadata-token: $token" \
              http://169.254.169.254/latest/meta-data/instance-id)
            availability_zone=$(curl -H "X-aws-ec2-metadata-token: $token" \
              http://169.254.169.254/latest/meta-data/placement/availability-zone)

            cat > "$app_dir/index.html" <<HTML
            <!doctype html>
            <html lang="en">
            <head>
              <meta charset="utf-8">
              <title>Scaling AWS Compute Demo</title>
              <style>
                body {
                  font-family: Arial, sans-serif;
                  margin: 2rem;
                  background: #f7f9fc;
                  color: #1f2937;
                }
                .card {
                  max-width: 720px;
                  background: #ffffff;
                  padding: 2rem;
                  border-radius: 12px;
                  box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
                }
                code {
                  background: #eef2ff;
                  padding: 0.2rem 0.4rem;
                  border-radius: 6px;
                }
              </style>
            </head>
            <body>
              <div class="card">
                <h1>Scaling AWS Compute Demo</h1>
                <p>This page is being served by an EC2 instance in an Auto Scaling Group behind an Application Load Balancer.</p>
                <p><strong>Instance ID:</strong> <code>$instance_id</code></p>
                <p><strong>Availability Zone:</strong> <code>$availability_zone</code></p>
                <p><strong>Stack:</strong> <code>${AWS::StackName}</code></p>
              </div>
            </body>
            </html>
            HTML

            cat > /etc/systemd/system/compute-signals-demo.service <<'SERVICE'
            [Unit]
            Description=Simple HTTP server for the Scaling AWS Compute demo
            After=network-online.target
            Wants=network-online.target

            [Service]
            Type=simple
            WorkingDirectory=/opt/compute-signals-demo
            ExecStart=/usr/bin/python3 -m http.server 80 --directory /opt/compute-signals-demo
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            SERVICE

            systemctl daemon-reload
            systemctl enable --now compute-signals-demo.service

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      DesiredCapacity: !Ref DesiredCapacity
      MinSize: !Ref MinSize
      MaxSize: !Ref MaxSize
      HealthCheckGracePeriod: 120
      HealthCheckType: ELB
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      MetricsCollection:
        - Granularity: "1Minute"
      TargetGroupARNs:
        - !Ref ApplicationTargetGroup
      VPCZoneIdentifier: !Ref AsgSubnetIds
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-asg-instance
          PropagateAtLaunch: true
        - Key: asg-webserver
          Value: true
          PropagateAtLaunch: true
        - Key: role
          Value: webserver
          PropagateAtLaunch: true

Outputs:
  AlbURL:
    Description: Application Load Balancer URL
    Value: !Sub http://${ApplicationLoadBalancer.DNSName}/

  LoadBalancerSecurityGroupId:
    Description: Security group for the public ALB
    Value: !GetAtt LoadBalancerSecurityGroup.GroupId
    Export:
      Name: !Sub ${AWS::StackName}-LoadBalancerSecurityGroupId

  InstanceSecurityGroupId:
    Description: Security group for the Auto Scaling Group instances
    Value: !GetAtt InstanceSecurityGroup.GroupId
    Export:
      Name: !Sub ${AWS::StackName}-InstanceSecurityGroupId

  AutoScalingGroupName:
    Description: Auto Scaling Group name
    Value: !Ref AutoScalingGroup
