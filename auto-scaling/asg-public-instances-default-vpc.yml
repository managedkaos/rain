---
Description: Public ALB and public Auto Scaling Group in the default VPC with parameterized request-based and CPU-based scaling on Amazon Linux 2023

Parameters:
  AsgMinSize:
    Type: Number
    Default: 1
    MinValue: 1
    Description: Minimum number of EC2 instances in the Auto Scaling group

  AsgMaxSize:
    Type: Number
    Default: 6
    MinValue: 1
    Description: Maximum number of EC2 instances in the Auto Scaling group

  AsgDesiredCapacity:
    Type: Number
    Default: 2
    MinValue: 1
    Description: Initial number of EC2 instances in the Auto Scaling group

  CpuTargetValue:
    Type: Number
    Default: 50
    MinValue: 10
    MaxValue: 90
    Description: Target average CPU utilization percentage for target tracking scaling

  RequestCountTarget:
    Type: Number
    Default: 100
    MinValue: 100
    Description: Target ALB requests per target for target tracking scaling

  HealthCheckGracePeriod:
    Type: Number
    Default: 60
    MinValue: 0
    Description: Grace period in seconds before ELB health checks affect new instances

  DefaultInstanceWarmup:
    Type: Number
    Default: 30
    MinValue: 0
    Description: Default instance warmup in seconds for scaling metrics

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Default VPC ID for the ALB, target group, security groups, and instances

  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnet IDs from the default VPC for the ALB and Auto Scaling group

Resources:
  Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: [ec2.amazonaws.com]
            Action: ['sts:AssumeRole']
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  Profile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles: [!Ref Role]

  LoadBalancerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic from the internet to the ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - CidrIp: 0.0.0.0/0
          IpProtocol: tcp
          FromPort: 80
          ToPort: 80
      SecurityGroupEgress:
        - CidrIp: 0.0.0.0/0
          IpProtocol: -1

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic from the ALB to the Auto Scaling Group instances
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref LoadBalancerSecurityGroup
      SecurityGroupEgress:
        - CidrIp: 0.0.0.0/0
          IpProtocol: -1

  LoadGeneratorSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow outbound access to the ALB
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - CidrIp: 0.0.0.0/0
          IpProtocol: -1

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      SecurityGroups:
        - !Ref LoadBalancerSecurityGroup
      Subnets: !Ref PublicSubnetIds
      Type: application

  ApplicationTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      HealthCheckEnabled: true
      HealthCheckPath: /
      HealthCheckProtocol: HTTP
      Matcher:
        HttpCode: 200
      Port: 80
      Protocol: HTTP
      TargetType: instance
      VpcId: !Ref VpcId

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ApplicationTargetGroup
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64}}'
        InstanceType: t3.small
        IamInstanceProfile:
          Name: !Ref Profile
        MetadataOptions:
          HttpTokens: required
        NetworkInterfaces:
          - AssociatePublicIpAddress: true
            DeviceIndex: 0
            Groups:
              - !Ref InstanceSecurityGroup
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub ${AWS::StackName}-asg-webserver
              - Key: asg-webserver
                Value: true
              - Key: role
                Value: webserver

        UserData: !Base64
          Fn::Sub: |
            #!/bin/bash -xe
            exec > >(tee /var/log/user-data.log) 2>&1

            dnf install stress-ng amazon-cloudwatch-agent -y

            mkdir -p /opt/aws/amazon-cloudwatch-agent/etc
            cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json <<'CWAGENT'
            {
              "metrics": {
                "metrics_collected": {
                  "cpu": {
                    "measurement": ["cpu_usage_idle", "cpu_usage_user", "cpu_usage_system"],
                    "metrics_collection_interval": 60,
                    "totalcpu": true
                  },
                  "mem": {
                    "measurement": ["mem_used_percent"],
                    "metrics_collection_interval": 60
                  }
                }
              }
            }
            CWAGENT

            systemctl enable amazon-cloudwatch-agent
            systemctl start amazon-cloudwatch-agent

            app_dir=/opt/compute-signals-demo
            mkdir -p "$app_dir"

            token=$(curl -X PUT "http://169.254.169.254/latest/api/token" \
              -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
            instance_id=$(curl -H "X-aws-ec2-metadata-token: $token" \
              http://169.254.169.254/latest/meta-data/instance-id)
            availability_zone=$(curl -H "X-aws-ec2-metadata-token: $token" \
              http://169.254.169.254/latest/meta-data/placement/availability-zone)

            cat > "$app_dir/index.html" <<HTML
            <!doctype html>
            <html lang="en">
            <head>
              <meta charset="utf-8">
              <title>Scaling AWS Compute Demo</title>
              <style>
                body {
                  font-family: Arial, sans-serif;
                  margin: 2rem;
                  background: #f7f9fc;
                  color: #1f2937;
                }
                .card {
                  max-width: 720px;
                  background: #ffffff;
                  padding: 2rem;
                  border-radius: 12px;
                  box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
                }
                code {
                  background: #eef2ff;
                  padding: 0.2rem 0.4rem;
                  border-radius: 6px;
                }
              </style>
            </head>
            <body>
              <div class="card">
                <h1>Scaling AWS Compute Demo</h1>
                <p>This page is being served by an EC2 instance in an Auto Scaling Group behind an Application Load Balancer.</p>
                <p><strong>Instance ID:</strong> <code>$instance_id</code></p>
                <p><strong>Availability Zone:</strong> <code>$availability_zone</code></p>
                <p><strong>Stack:</strong> <code>${AWS::StackName}</code></p>
              </div>
            </body>
            </html>
            HTML

            cat > /etc/systemd/system/compute-signals-demo.service <<'SERVICE'
            [Unit]
            Description=Simple HTTP server for the Scaling AWS Compute demo
            After=network-online.target
            Wants=network-online.target

            [Service]
            Type=simple
            WorkingDirectory=/opt/compute-signals-demo
            ExecStart=/usr/bin/python3 -m http.server 80 --directory /opt/compute-signals-demo
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            SERVICE

            systemctl daemon-reload
            systemctl enable --now compute-signals-demo.service

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      DesiredCapacity: !Ref AsgDesiredCapacity
      MinSize: !Ref AsgMinSize
      MaxSize: !Ref AsgMaxSize
      HealthCheckGracePeriod: !Ref HealthCheckGracePeriod
      HealthCheckType: ELB
      DefaultInstanceWarmup: !Ref DefaultInstanceWarmup
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      MetricsCollection:
        - Granularity: "1Minute"
      TargetGroupARNs:
        - !Ref ApplicationTargetGroup
      VPCZoneIdentifier: !Ref PublicSubnetIds
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-asg-webserver
          PropagateAtLaunch: true
        - Key: asg-webserver
          Value: true
          PropagateAtLaunch: true
        - Key: role
          Value: webserver
          PropagateAtLaunch: true


  CpuTargetTrackingScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: !Ref CpuTargetValue

  RequestCountTargetTrackingScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ALBRequestCountPerTarget
          ResourceLabel: !Join
            - '/'
            - - !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
              - !GetAtt ApplicationTargetGroup.TargetGroupFullName
        TargetValue: !Ref RequestCountTarget

  LoadGeneratorInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64}}'
      InstanceType: t3.small
      IamInstanceProfile: !Ref Profile
      MetadataOptions:
        HttpTokens: required
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref LoadGeneratorSecurityGroup
          SubnetId: !Select [0, !Ref PublicSubnetIds]
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-load-generator
        - Key: role
          Value: load-generator
      UserData:
        !Base64
          Fn::Sub: |
            #!/bin/bash -xe
            exec > >(tee /var/log/user-data.log) 2>&1

            dnf install -y httpd-tools

            cat > /usr/local/bin/run-ab-load.sh <<'SCRIPT'
            #!/bin/bash
            set -euo pipefail
            while true; do
              ab -n 1000 -c 20 http://${ApplicationLoadBalancer.DNSName}/
              sleep 240
            done
            SCRIPT

            chmod +x /usr/local/bin/run-ab-load.sh

            cat > /etc/systemd/system/ab-load.service <<'SERVICE'
            [Unit]
            Description=Continuous Apache Bench load generator against the ALB
            After=network-online.target
            Wants=network-online.target

            [Service]
            Type=simple
            ExecStart=/usr/local/bin/run-ab-load.sh
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            SERVICE

            systemctl daemon-reload
            systemctl enable ab-load.service
            systemctl start ab-load.service

Outputs:
  AlbURL:
    Description: Application Load Balancer URL
    Value: !Sub http://${ApplicationLoadBalancer.DNSName}/

  AutoScalingGroupName:
    Description: Auto Scaling Group name
    Value: !Ref AutoScalingGroup

  LoadGeneratorInstanceId:
    Description: Instance ID of the Apache Bench load generator instance
    Value: !Ref LoadGeneratorInstance

  LoadGeneratorAbCommand:
    Description: Continuous Apache Bench command for the load generator
    Value: !Sub while true; do ab -n 1000 -c 20 http://${ApplicationLoadBalancer.DNSName}/; sleep 120; done

  LoadGeneratorSsmCommand:
    Description: AWS CLI SSM command to connect to the LoadGeneratorInstance as root
    Value: !Sub |
      aws ssm start-session --target ${LoadGeneratorInstance}
