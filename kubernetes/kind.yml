---
Description: An EC2 instance running Amazon Linux 2023 with Kind (Kubernetes in Docker) and kubectl for Kubernetes exploration; includes a security group allowing TCP traffic on port 80, and an IAM role with permissions for Systems Manager.

Parameters:
  InstanceType:
    Description: The size to use for the EC2 instance
    Type: String
    AllowedValues:
      - t3.medium
      - t3.large
      - t3.xlarge
      - t3.2xlarge
    Default: t3.large
    ConstraintDescription: Must be a valid EC2 instance type. Kind requires at least 2 CPUs and 2GB RAM.

Resources:
  Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM

  Profile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref Role

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow TCP traffic on port 80
      SecurityGroupIngress:
        - CidrIp: 0.0.0.0/0
          IpProtocol: tcp
          FromPort: 80
          ToPort: 80

  Server:
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M
    Type: AWS::EC2::Instance
    Metadata:
      AWS::CloudFormation::Init:
        configSets:
          application_installation:
            - install_cfn
            - install_apps
            - install_docker
            - install_kubectl
            - install_kind
            - configure_kind_service
        install_cfn:
          files:
            /etc/cfn/cfn-hup.conf:
              content: !Sub |
                [main]
                stack=${AWS::StackId}
                region=${AWS::Region}
              mode: "000400"
              owner: root
              group: root
            /etc/cfn/hooks.d/cfn-auto-reloader.conf:
              content: !Sub |
                [cfn-auto-reloader-hook]
                triggers=post.update
                path=Resources.Server.Metadata.AWS::CloudFormation::Init
                action=/opt/aws/bin/cfn-init -v
                      --stack ${AWS::StackName}
                      --resource Server
                      --configsets application_installation
                      --region ${AWS::Region}
              mode: "000400"
              owner: root
              group: root
          services:
            systemd:
              cfn-hup:
                enabled: "true"
                ensureRunning: "true"
                files:
                  - /etc/cfn/cfn-hup.conf
                  - /etc/cfn/hooks.d/cfn-auto-reloader.conf
        install_apps:
          packages:
            yum:
              git: []
        install_docker:
          commands:
            01_install_docker:
              command: dnf install -y docker
            02_start_docker:
              command: systemctl enable --now docker
            03_add_ec2_user_to_docker:
              command: usermod -aG docker ec2-user
            04_add_ssm_user_to_docker:
              command: usermod -aG docker ssm-user
        install_kubectl:
          commands:
            01_download_kubectl:
              command: curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
              cwd: /tmp
            02_install_kubectl:
              command: install -o root -g root -m 0755 /tmp/kubectl /usr/local/bin/kubectl
        install_kind:
          commands:
            01_download_kind:
              command: curl -Lo /tmp/kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
            02_install_kind:
              command: install -o root -g root -m 0755 /tmp/kind /usr/local/bin/kind
        configure_kind_service:
          files:
            /etc/systemd/system/kind.service:
              content: |
                [Unit]
                Description=Kind local Kubernetes cluster
                After=docker.service

                [Service]
                Type=oneshot
                RemainAfterExit=yes
                User=ssm-user
                Group=ssm-user
                ExecStart=/usr/local/bin/kind create cluster
                ExecStop=/usr/local/bin/kind delete cluster
                WorkingDirectory=/home/ssm-user

                [Install]
                WantedBy=multi-user.target
              mode: "000644"
              owner: root
              group: root
          commands:
            01_daemon_reload:
              command: systemctl daemon-reload
            02_enable_kind:
              command: systemctl enable kind.service
            03_start_kind:
              command: systemctl start kind.service
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64}}'
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 50
            VolumeType: gp3
            DeleteOnTermination: true
      IamInstanceProfile: !Ref Profile
      SecurityGroups:
        - !Ref SecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}
      UserData: !Base64
        Fn::Sub: |
          #!/bin/bash -xe
          exec > >(tee /var/log/user-data.log) 2>&1

          dnf update -y aws-cfn-bootstrap

          /opt/aws/bin/cfn-init -v \
            --stack ${AWS::StackName} \
            --region ${AWS::Region} \
            --resource Server \
            --configsets application_installation

          /opt/aws/bin/cfn-signal -e $? \
            --stack ${AWS::StackName} \
            --region ${AWS::Region} \
            --resource Server

  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      InstanceId: !Ref Server

Outputs:
  TerminalURL:
    Description: Follow this URL to open a terminal on the server
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/systems-manager/session-manager/${Server}?region=${AWS::Region}
  KindCreateCommand:
    Description: Run this command after connecting to create a Kind cluster
    Value: kind create cluster
  PublicIP:
    Description: The public IP address of the instance
    Value: !Ref ElasticIP
