---
Description: An EC2 instance running Amazon Linux 2023 with k3s lightweight Kubernetes and kubectl for Kubernetes exploration; includes a security group allowing TCP traffic on port 80, and an IAM role with permissions for Systems Manager.

Parameters:
  InstanceType:
    Description: The size to use for the EC2 instance
    Type: String
    AllowedValues:
      - t3.medium
      - t3.large
      - t3.xlarge
      - t3.2xlarge
    Default: t3.large
    ConstraintDescription: Must be a valid EC2 instance type.

Resources:
  Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM

  Profile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref Role

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow TCP traffic on port 80
      SecurityGroupIngress:
        - CidrIp: 0.0.0.0/0
          IpProtocol: tcp
          FromPort: 80
          ToPort: 80

  Server:
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M
    Type: AWS::EC2::Instance
    Metadata:
      AWS::CloudFormation::Init:
        configSets:
          application_installation:
            - install_cfn
            - install_apps
            - install_k3s
            - configure_k3s_access
        install_cfn:
          files:
            /etc/cfn/cfn-hup.conf:
              content: !Sub |
                [main]
                stack=${AWS::StackId}
                region=${AWS::Region}
              mode: "000400"
              owner: root
              group: root
            /etc/cfn/hooks.d/cfn-auto-reloader.conf:
              content: !Sub |
                [cfn-auto-reloader-hook]
                triggers=post.update
                path=Resources.Server.Metadata.AWS::CloudFormation::Init
                action=/opt/aws/bin/cfn-init -v
                      --stack ${AWS::StackName}
                      --resource Server
                      --configsets application_installation
                      --region ${AWS::Region}
              mode: "000400"
              owner: root
              group: root
          services:
            systemd:
              cfn-hup:
                enabled: "true"
                ensureRunning: "true"
                files:
                  - /etc/cfn/cfn-hup.conf
                  - /etc/cfn/hooks.d/cfn-auto-reloader.conf
        install_apps:
          packages:
            yum:
              git: []
        install_k3s:
          commands:
            01_install_k3s:
              command: curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--write-kubeconfig-mode 644" sh -
        configure_k3s_access:
          commands:
            01_symlink_kubectl:
              command: ln -sf /usr/local/bin/k3s /usr/local/bin/kubectl
            02_setup_ec2_user_kubeconfig:
              command: |
                mkdir -p /home/ec2-user/.kube
                cp /etc/rancher/k3s/k3s.yaml /home/ec2-user/.kube/config
                chown -R ec2-user:ec2-user /home/ec2-user/.kube
            03_setup_ssm_user_kubeconfig:
              command: |
                mkdir -p /home/ssm-user/.kube
                cp /etc/rancher/k3s/k3s.yaml /home/ssm-user/.kube/config
                chown -R ssm-user:ssm-user /home/ssm-user/.kube
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64}}'
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 50
            VolumeType: gp3
            DeleteOnTermination: true
      IamInstanceProfile: !Ref Profile
      SecurityGroups:
        - !Ref SecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}
      UserData: !Base64
        Fn::Sub: |
          #!/bin/bash -xe
          exec > >(tee /var/log/user-data.log) 2>&1

          dnf update -y aws-cfn-bootstrap

          /opt/aws/bin/cfn-init -v \
            --stack ${AWS::StackName} \
            --region ${AWS::Region} \
            --resource Server \
            --configsets application_installation

          /opt/aws/bin/cfn-signal -e $? \
            --stack ${AWS::StackName} \
            --region ${AWS::Region} \
            --resource Server

  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      InstanceId: !Ref Server

Outputs:
  TerminalURL:
    Description: Follow this URL to open a terminal on the server
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/systems-manager/session-manager/${Server}?region=${AWS::Region}
  PublicIP:
    Description: The public IP address of the instance
    Value: !Ref ElasticIP
